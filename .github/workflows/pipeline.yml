name: GRC Intelligence Pipeline

on:
  schedule:
    # 5 AM IST = 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
    # 6 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run intelligence pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/main.py

      - name: Copy data to docs folder
        run: |
          cp data/linkedin_post.json docs/data/
          cp data/carousel.json docs/data/
          cp data/newsletter.json docs/data/
          cp data/articles.json docs/data/

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update content - $(date +'%Y-%m-%d %H:%M')"
          git push
