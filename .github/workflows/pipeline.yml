name: GRC Intelligence Pipeline

on:
  schedule:
    # 5 AM IST = 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
    # 6 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run intelligence pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/main.py

      - name: Copy data to docs folder and accumulate history
        run: |
          mkdir -p docs/data
          cp data/linkedin_post.json docs/data/
          cp data/carousel.json docs/data/
          cp data/newsletter.json docs/data/ 2>/dev/null || true
          cp data/articles.json docs/data/
          
          # Accumulate content history (append new posts)
          python3 << 'EOF'
          import json
          from datetime import datetime
          
          # Load existing history
          try:
              with open('docs/data/content_history.json', 'r') as f:
                  history = json.load(f)
          except:
              history = []
          
          # Load new post
          try:
              with open('data/linkedin_post.json', 'r') as f:
                  new_post = json.load(f)
              
              # Create history entry
              entry = {
                  'title': new_post.get('inspired_by', {}).get('topic', 'Unknown'),
                  'linkedin_post': new_post.get('content', ''),
                  'domains': new_post.get('inspired_by', {}).get('domains', ['GRC']),
                  'generated_at': new_post.get('generated_at', datetime.now().isoformat())
              }
              
              # Check if this is a duplicate (same title)
              existing_titles = [h.get('title', '') for h in history]
              if entry['title'] not in existing_titles:
                  history.append(entry)
                  print(f"Added new post to history: {entry['title']}")
              else:
                  print(f"Skipping duplicate: {entry['title']}")
              
              # Keep last 100 posts
              history = history[-100:]
              
              # Save history
              with open('docs/data/content_history.json', 'w') as f:
                  json.dump(history, f, indent=2)
              
              print(f"Content history now has {len(history)} posts")
          except Exception as e:
              print(f"Error updating history: {e}")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update content - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
