name: GRC Intelligence Pipeline

on:
  schedule:
    # 5 AM IST = 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
    # 6 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run intelligence pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/main.py

      - name: Copy data to docs folder and accumulate history
        run: |
          mkdir -p docs/data
          cp data/linkedin_post.json docs/data/
          cp data/carousel.json docs/data/
          cp data/newsletter.json docs/data/ 2>/dev/null || true
          cp data/articles.json docs/data/
          cp data/domain_posts.json docs/data/ 2>/dev/null || true
          
          # Accumulate content history (append new posts)
          python3 << 'EOF'
          import json
          from datetime import datetime
          
          # Load existing history
          try:
              with open('docs/data/content_history.json', 'r') as f:
                  history = json.load(f)
          except:
              history = []
          
          existing_titles = set(h.get('title', '') for h in history)
          new_count = 0
          
          # Add today's main post
          try:
              with open('data/linkedin_post.json', 'r') as f:
                  new_post = json.load(f)
              
              entry = {
                  'title': new_post.get('inspired_by', {}).get('topic', 'Unknown'),
                  'linkedin_post': new_post.get('content', ''),
                  'domains': new_post.get('inspired_by', {}).get('domains', ['GRC']),
                  'template_used': new_post.get('template_name', 'Insight'),
                  'generated_at': new_post.get('generated_at', datetime.now().isoformat())
              }
              
              if entry['title'] not in existing_titles:
                  history.append(entry)
                  existing_titles.add(entry['title'])
                  new_count += 1
                  print(f"Added main post: {entry['title']}")
          except Exception as e:
              print(f"Error with main post: {e}")
          
          # Add domain-specific posts
          try:
              with open('data/domain_posts.json', 'r') as f:
                  domain_posts = json.load(f)
              
              for post in domain_posts:
                  entry = {
                      'title': post.get('inspired_by', {}).get('topic', 'Unknown'),
                      'linkedin_post': post.get('content', ''),
                      'domains': [post.get('domain', 'GRC')],
                      'template_used': post.get('template_name', 'Insight'),
                      'generated_at': post.get('generated_at', datetime.now().isoformat())
                  }
                  
                  if entry['title'] not in existing_titles:
                      history.append(entry)
                      existing_titles.add(entry['title'])
                      new_count += 1
                      print(f"Added {post.get('domain')} post: {entry['title'][:50]}...")
          except Exception as e:
              print(f"Error with domain posts: {e}")
          
          # Keep last 200 posts
          history = history[-200:]
          
          # Save history
          with open('docs/data/content_history.json', 'w') as f:
              json.dump(history, f, indent=2)
          
          print(f"Added {new_count} new posts. History now has {len(history)} total.")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update content - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
