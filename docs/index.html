<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC Intelligence Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --border: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --gradient-1: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #10b981, #3b82f6);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Password Screen */
        .password-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 1000;
        }

        .password-screen.hidden {
            display: none;
        }

        .password-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-box .logo {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .password-box .logo svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .password-box h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .password-box p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .password-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .password-input-wrapper input {
            flex: 1;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .password-input-wrapper input:focus {
            border-color: var(--accent-blue);
        }

        .password-input-wrapper button {
            padding: 1rem 1.5rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .password-input-wrapper button:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: var(--accent-red);
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        /* Main Dashboard */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .stat-icon.purple { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }

        .stat-icon svg {
            width: 24px;
            height: 24px;
        }

        .stat-info h3 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .stat-info p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Domain Filter */
        .domain-filter {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .domain-btn {
            padding: 0.625rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .domain-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .domain-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .domain-btn .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .domain-btn .dot.grc { background: var(--accent-blue); }
        .domain-btn .dot.privacy { background: var(--accent-purple); }
        .domain-btn .dot.security { background: var(--accent-red); }
        .domain-btn .dot.devsecops { background: var(--accent-green); }
        .domain-btn .dot.ai { background: var(--accent-orange); }
        .domain-btn .dot.product { background: var(--accent-pink); }

        /* Two Column Layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--accent-blue);
        }

        /* News List */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }

        .news-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateX(4px);
        }

        .news-item-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .news-score {
            min-width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .news-score.high { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .news-score.medium { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
        .news-score.low { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        .news-content {
            flex: 1;
        }

        .news-title {
            font-weight: 500;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .news-why {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .news-source {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .news-domain {
            padding: 0.25rem 0.625rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .news-domain.grc { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .news-domain.privacy { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }
        .news-domain.security { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .news-domain.devsecops { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .news-domain.ai { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
        .news-domain.product { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }

        .news-arrow {
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .news-item:hover .news-arrow {
            transform: translateX(4px);
            color: var(--accent-blue);
        }

        /* Right Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Content Cards */
        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .content-card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content-card-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .content-card-title svg {
            width: 18px;
            height: 18px;
            color: var(--accent-blue);
        }

        .copy-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .copy-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .copy-btn.copied {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .copy-btn svg {
            width: 14px;
            height: 14px;
        }

        .content-card-body {
            padding: 1.25rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .content-card-body::-webkit-scrollbar {
            width: 6px;
        }

        .content-card-body::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .content-card-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .content-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .content-meta {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Carousel Slides */
        .carousel-slides {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .slide-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 1rem;
        }

        .slide-number {
            width: 24px;
            height: 24px;
            background: var(--gradient-1);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .slide-content {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Domain Stats */
        .domain-stats {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
        }

        .domain-stats h3 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .domain-bar {
            margin-bottom: 0.75rem;
        }

        .domain-bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.375rem;
            font-size: 0.75rem;
        }

        .domain-bar-label {
            color: var(--text-secondary);
        }

        .domain-bar-count {
            color: var(--text-muted);
        }

        .domain-bar-track {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .domain-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .domain-bar-fill.grc { background: var(--accent-blue); }
        .domain-bar-fill.privacy { background: var(--accent-purple); }
        .domain-bar-fill.security { background: var(--accent-red); }
        .domain-bar-fill.devsecops { background: var(--accent-green); }
        .domain-bar-fill.ai { background: var(--accent-orange); }
        .domain-bar-fill.product { background: var(--accent-pink); }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.75rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .two-col {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .sidebar {
                grid-template-columns: 1fr;
            }
            .header {
                padding: 1rem;
            }
            .main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div class="password-screen" id="passwordScreen">
        <div class="password-box">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <h1>GRC Intelligence Copilot</h1>
            <p>Your AI-powered GRC content hub</p>
            <div class="password-input-wrapper">
                <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter')checkPassword()">
                <button onclick="checkPassword()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
            <p class="error-msg" id="errorMsg"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <div class="header-left">
                <div class="header-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span class="header-title">GRC Intelligence</span>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="lastUpdated">Loading...</span>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalArticles">0</h3>
                        <p>Articles Today</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>6</h3>
                        <p>Domains Tracked</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3 id="topScore">0</h3>
                        <p>Top Score</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>3</h3>
                        <p>Content Ready</p>
                    </div>
                </div>
            </div>

            <!-- Domain Filter -->
            <div class="domain-filter">
                <button class="domain-btn active" data-domain="all">All Domains</button>
                <button class="domain-btn" data-domain="GRC">
                    <span class="dot grc"></span>GRC
                </button>
                <button class="domain-btn" data-domain="Privacy">
                    <span class="dot privacy"></span>Privacy
                </button>
                <button class="domain-btn" data-domain="Security">
                    <span class="dot security"></span>Security
                </button>
                <button class="domain-btn" data-domain="DevSecOps">
                    <span class="dot devsecops"></span>DevSecOps
                </button>
                <button class="domain-btn" data-domain="AI">
                    <span class="dot ai"></span>AI
                </button>
                <button class="domain-btn" data-domain="Product">
                    <span class="dot product"></span>Product
                </button>
            </div>

            <!-- Two Column Layout -->
            <div class="two-col">
                <!-- News Column -->
                <div class="news-column">
                    <div class="section-header">
                        <h2 class="section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                            </svg>
                            Today's Top Stories
                        </h2>
                    </div>
                    <div class="news-list" id="newsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <span>Loading news...</span>
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="sidebar">
                    <!-- LinkedIn Post -->
                    <div class="content-card">
                        <div class="content-card-header">
                            <span class="content-card-title">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                                </svg>
                                LinkedIn Post
                            </span>
                            <button class="copy-btn" onclick="copyContent('linkedinPost')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                                Copy
                            </button>
                        </div>
                        <div class="content-card-body">
                            <div class="content-text" id="linkedinPost">Loading...</div>
                        </div>
                        <div class="content-meta" id="linkedinMeta"></div>
                    </div>

                    <!-- Carousel -->
                    <div class="content-card">
                        <div class="content-card-header">
                            <span class="content-card-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                Carousel Slides
                            </span>
                            <button class="copy-btn" onclick="copyContent('carouselContent')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                                Copy
                            </button>
                        </div>
                        <div class="content-card-body">
                            <div class="carousel-slides" id="carouselContent">Loading...</div>
                        </div>
                    </div>

                    <!-- Newsletter -->
                    <div class="content-card">
                        <div class="content-card-header">
                            <span class="content-card-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                                Newsletter
                            </span>
                            <button class="copy-btn" onclick="copyContent('newsletterContent')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                                Copy
                            </button>
                        </div>
                        <div class="content-card-body" style="max-height: 400px;">
                            <div class="content-text" id="newsletterContent">Loading...</div>
                        </div>
                        <div class="content-meta" id="newsletterMeta"></div>
                    </div>

                    <!-- Domain Distribution -->
                    <div class="domain-stats">
                        <h3>Domain Distribution</h3>
                        <div id="domainBars"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const PASSWORD = "GRC2026!Shree";
        const DATA_PATH = "data/";
        
        let allArticles = [];
        let currentFilter = "all";

        // Password check
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                document.getElementById('passwordScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                loadAllData();
            } else {
                document.getElementById('errorMsg').textContent = "Incorrect password";
                document.getElementById('passwordInput').value = '';
            }
        }

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadArticles(),
                loadLinkedInPost(),
                loadCarousel(),
                loadNewsletter()
            ]);
            setupFilters();
        }

        // Load articles
        async function loadArticles() {
            try {
                const res = await fetch(DATA_PATH + 'articles.json');
                const articles = await res.json();
                allArticles = articles;
                
                document.getElementById('totalArticles').textContent = articles.length;
                if (articles.length > 0) {
                    document.getElementById('topScore').textContent = articles[0].score || 0;
                }
                
                renderNews(articles);
                renderDomainStats(articles);
            } catch (e) {
                document.getElementById('newsList').innerHTML = '<div class="empty-state">No articles available yet. Run the pipeline first.</div>';
            }
        }

        // Render news
        function renderNews(articles) {
            const container = document.getElementById('newsList');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="empty-state">No articles found.</div>';
                return;
            }

            container.innerHTML = articles.slice(0, 15).map(article => {
                const score = article.score || 5;
                const scoreClass = score >= 7 ? 'high' : (score >= 4 ? 'medium' : 'low');
                const domain = getDomain(article.domains);
                const domainClass = domain.toLowerCase().replace(/\s+/g, '');
                
                return `
                    <a href="${article.url || '#'}" target="_blank" rel="noopener" class="news-item" data-domains="${(article.domains || []).join(',')}">
                        <div class="news-item-header">
                            <div class="news-score ${scoreClass}">${score}</div>
                            <div class="news-content">
                                <div class="news-title">${escapeHtml(article.title)}</div>
                                <div class="news-why">${escapeHtml(article.score_reason || 'Relevant to GRC professionals')}</div>
                                <div class="news-meta">
                                    <span class="news-source">${article.source || 'Unknown'}</span>
                                    <span class="news-domain ${domainClass}">${domain}</span>
                                </div>
                            </div>
                            <div class="news-arrow">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Get primary domain
        function getDomain(domains) {
            if (!domains || domains.length === 0) return 'GRC';
            const map = {
                'Privacy & Data Protection': 'Privacy',
                'Data Protection': 'Privacy',
                'Information Security': 'Security',
                'AI Governance': 'AI'
            };
            for (const d of domains) {
                if (map[d]) return map[d];
            }
            return domains[0] || 'GRC';
        }

        // Domain stats
        function renderDomainStats(articles) {
            const counts = { GRC: 0, Privacy: 0, Security: 0, DevSecOps: 0, AI: 0, Product: 0 };
            
            articles.forEach(a => {
                const d = getDomain(a.domains);
                if (counts.hasOwnProperty(d)) counts[d]++;
                else counts.GRC++;
            });
            
            const max = Math.max(...Object.values(counts), 1);
            const container = document.getElementById('domainBars');
            
            container.innerHTML = Object.entries(counts).map(([domain, count]) => {
                const pct = (count / max) * 100;
                const cls = domain.toLowerCase();
                return `
                    <div class="domain-bar">
                        <div class="domain-bar-header">
                            <span class="domain-bar-label">${domain}</span>
                            <span class="domain-bar-count">${count}</span>
                        </div>
                        <div class="domain-bar-track">
                            <div class="domain-bar-fill ${cls}" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load LinkedIn post
        async function loadLinkedInPost() {
            try {
                const res = await fetch(DATA_PATH + 'linkedin_post.json');
                const data = await res.json();
                
                document.getElementById('linkedinPost').textContent = data.content || 'No content available';
                
                if (data.based_on) {
                    document.getElementById('linkedinMeta').innerHTML = `Based on: ${data.based_on.title} (Score: ${data.based_on.score}/10)`;
                }
                
                if (data.generated_at) {
                    updateTimestamp(data.generated_at);
                }
            } catch (e) {
                document.getElementById('linkedinPost').textContent = 'Content will be generated after the pipeline runs.';
            }
        }

        // Load carousel
        async function loadCarousel() {
            try {
                const res = await fetch(DATA_PATH + 'carousel.json');
                const data = await res.json();
                
                const container = document.getElementById('carouselContent');
                
                if (data.slides && data.slides.length > 0) {
                    container.innerHTML = data.slides.map((slide, i) => `
                        <div class="slide-item">
                            <div class="slide-number">${i + 1}</div>
                            <div class="slide-content">${formatSlide(slide.content)}</div>
                        </div>
                    `).join('');
                } else if (data.raw_content) {
                    const slides = parseSlides(data.raw_content);
                    container.innerHTML = slides.map((content, i) => `
                        <div class="slide-item">
                            <div class="slide-number">${i + 1}</div>
                            <div class="slide-content">${content}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('carouselContent').innerHTML = '<div class="empty-state">Carousel will be generated.</div>';
            }
        }

        function formatSlide(content) {
            if (!content) return '';
            return escapeHtml(content)
                .replace(/Heading:\s*/gi, '<strong>')
                .replace(/Body:\s*/gi, '</strong><br>')
                .replace(/\n/g, '<br>');
        }

        function parseSlides(raw) {
            const slides = [];
            const parts = raw.split(/SLIDE\s*\d+[:\s]*/i);
            parts.forEach(p => {
                const cleaned = p.trim();
                if (cleaned) slides.push(formatSlide(cleaned));
            });
            return slides;
        }

        // Load newsletter
        async function loadNewsletter() {
            try {
                const res = await fetch(DATA_PATH + 'newsletter.json');
                const data = await res.json();
                
                document.getElementById('newsletterContent').textContent = data.content || 'Newsletter pending';
                document.getElementById('newsletterMeta').innerHTML = `${data.series || 'Newsletter'} - Episode ${data.episode || '?'}: ${data.title || 'Loading...'}`;
            } catch (e) {
                document.getElementById('newsletterContent').textContent = 'Newsletter generates every Tuesday.';
                document.getElementById('newsletterMeta').textContent = 'Publish on Wednesday';
            }
        }

        // Filter setup
        function setupFilters() {
            const buttons = document.querySelectorAll('.domain-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const domain = btn.dataset.domain;
                    currentFilter = domain;
                    filterNews(domain);
                });
            });
        }

        function filterNews(domain) {
            const items = document.querySelectorAll('.news-item');
            items.forEach(item => {
                if (domain === 'all') {
                    item.style.display = 'block';
                } else {
                    const domains = item.dataset.domains || '';
                    const primary = getDomain(domains.split(','));
                    item.style.display = (primary === domain || domains.includes(domain)) ? 'block' : 'none';
                }
            });
        }

        // Update timestamp
        function updateTimestamp(ts) {
            const date = new Date(ts);
            const options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('lastUpdated').textContent = 'Updated ' + date.toLocaleDateString('en-IN', options);
        }

        // Copy content
        async function copyContent(elementId) {
            const el = document.getElementById(elementId);
            const text = el.innerText || el.textContent;
            
            try {
                await navigator.clipboard.writeText(text);
                
                const card = el.closest('.content-card');
                const btn = card.querySelector('.copy-btn');
                const originalHTML = btn.innerHTML;
                
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Copied!
                `;
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (e) {
                alert('Copy failed. Please select and copy manually.');
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Focus on password input
        document.getElementById('passwordInput').focus();
    </script>
</body>
</html>
