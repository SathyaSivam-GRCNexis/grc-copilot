<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172E;
            --secondary: #1E88E5;
            --accent: #00D4FF;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg-dark: #0A0E27;
            --bg-card: #111B33;
            --bg-hover: #1A2847;
            --text: #F5F7FA;
            --text-secondary: #A8B5C7;
            --text-muted: #697B91;
            --border: #1E2D47;
            --grc: #FFF3E0; --grc-text: #8B5A00;
            --security: #FFEBEE; --security-text: #C62828;
            --privacy: #E3F2FD; --privacy-text: #1565C0;
            --ai: #F3E5F5; --ai-text: #7B1FA2;
            --devsecops: #E0F2F1; --devsecops-text: #00695C;
            --product: #FBE9E7; --product-text: #BF360C;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* Login Screen */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #1a2a5e 100%);
            position: relative;
            overflow: hidden;
        }
        
        #loginScreen::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .login-box {
            background: var(--bg-card);
            padding: 48px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 1px 1px rgba(0, 212, 255, 0.1);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .login-box h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-box p { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
        
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            transition: all 0.3s;
        }
        
        .login-box input::placeholder { color: var(--text-muted); }
        .login-box input:focus { 
            outline: none; 
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-box button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 136, 229, 0.4);
        }
        
        .login-error { color: var(--danger); margin-top: 16px; display: none; font-size: 13px; }
        
        .hidden { display: none !important; }
        
        /* App Layout */
        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Nav */
        .top-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg { width: 24px; height: 24px; color: white; }
        
        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
        }
        
        .nav-tab {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-tab:hover { 
            background: var(--bg-hover);
            color: var(--text);
        }
        
        .nav-tab.active {
            background: var(--bg-hover);
            color: var(--accent);
            border-color: var(--accent);
        }
        
        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 136, 229, 0.3);
        }
        
        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: var(--bg-hover);
            color: var(--text);
            border-color: var(--accent);
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        
        /* Page */
        .page { display: none; }
        .page.active { display: block; }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(30, 136, 229, 0.1) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
        }
        
        .hero-tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
        }
        
        .hero-text {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .hero-actions {
            display: flex;
            gap: 12px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.1);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        
        .stat-trend {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            gap: 20px;
        }
        
        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
        }
        
        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        
        .article-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.1);
        }
        
        .article-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .article-score.high {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .article-score.medium {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .article-score.low {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .article-title {
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            flex-grow: 1;
        }
        
        .article-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .article-source {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .domain-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        .domain-tag.grc { background: var(--grc); color: var(--grc-text); }
        .domain-tag.security { background: var(--security); color: var(--security-text); }
        .domain-tag.privacy { background: var(--privacy); color: var(--privacy-text); }
        .domain-tag.ai { background: var(--ai); color: var(--ai-text); }
        .domain-tag.devsecops { background: var(--devsecops); color: var(--devsecops-text); }
        .domain-tag.product { background: var(--product); color: var(--product-text); }
        
        /* Posts Section */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        
        .post-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.1);
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .post-template {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .post-date {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .post-content {
            flex-grow: 1;
            margin-bottom: 16px;
        }
        
        .post-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .post-domain {
            display: flex;
            gap: 4px;
        }
        
        .copy-btn {
            padding: 6px 12px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: white;
            padding: 14px 20px;
            border-radius: 6px;
            font-weight: 500;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .toast.show { transform: translateY(0); opacity: 1; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state h3 { color: var(--text); margin-bottom: 8px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .hero { padding: 24px; }
            .hero-title { font-size: 24px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .articles-grid { grid-template-columns: 1fr; }
            .posts-grid { grid-template-columns: 1fr; }
            .top-nav { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>GRC Copilot</h1>
            <p>Your intelligence operating system</p>
            <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
            <button onclick="login()">Enter</button>
            <p class="login-error" id="loginError">Incorrect password</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="logo-text">GRC Copilot</span>
            </div>
            
            <div class="nav-actions">
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="switchPage('dashboard')">Dashboard</button>
                    <button class="nav-tab" onclick="switchPage('articles')">Articles</button>
                    <button class="nav-tab" onclick="switchPage('posts')">Posts</button>
                </div>
                <button class="btn-secondary" onclick="location.reload()">Refresh</button>
                <button class="btn-primary" onclick="copyPost()">Copy Post</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Dashboard Page -->
            <div class="page active" id="dashboardPage">
                <!-- Hero Post -->
                <div class="hero" id="heroSection">
                    <div class="hero-content">
                        <span class="hero-tag">Today's Post</span>
                        <h1 class="hero-title" id="heroTitle">Loading...</h1>
                        <p class="hero-text" id="heroText"></p>
                        <div class="hero-actions">
                            <button class="btn-primary" onclick="copyPost()">Copy Post</button>
                            <button class="btn-secondary" onclick="switchPage('posts')">View All Posts</button>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Articles</div>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-trend">From 91 sources</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">High Priority</div>
                        <div class="stat-value" id="statHigh">0</div>
                        <div class="stat-trend">Score 24+</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Posts Generated</div>
                        <div class="stat-value" id="statPosts">0</div>
                        <div class="stat-trend">Ready to share</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Top Score</div>
                        <div class="stat-value" id="statTopScore">0</div>
                        <div class="stat-trend">Out of 40</div>
                    </div>
                </div>

                <!-- Top Articles -->
                <div class="content-grid">
                    <h2 class="section-title">Top Stories This Week</h2>
                    <div class="articles-grid" id="topArticles"></div>
                </div>
            </div>

            <!-- Articles Page -->
            <div class="page" id="articlesPage">
                <h2 class="section-title">All Articles</h2>
                <div class="articles-grid" id="allArticles"></div>
            </div>

            <!-- Posts Page -->
            <div class="page" id="postsPage">
                <h2 class="section-title">Generated Posts</h2>
                <div class="posts-grid" id="allPosts"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let newsData = [];
        let contentData = [];
        let currentPost = '';
        const PASSWORD = 'GRC2026!Shree';

        // Auth
        function login() {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                localStorage.setItem('grc_auth', 'true');
                showApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadData();
        }

        if (localStorage.getItem('grc_auth') === 'true') {
            showApp();
        }

        // Load Data
        async function loadData() {
            try {
                const [newsRes, postRes, historyRes, domainPostsRes] = await Promise.all([
                    fetch('data/articles.json').catch(() => ({ ok: false })),
                    fetch('data/linkedin_post.json').catch(() => ({ ok: false })),
                    fetch('data/content_history.json').catch(() => ({ ok: false })),
                    fetch('data/domain_posts.json').catch(() => ({ ok: false }))
                ]);

                if (newsRes.ok) newsData = await newsRes.json();

                // Latest post
                if (postRes.ok) {
                    const post = await postRes.json();
                    currentPost = post.content || '';
                    document.getElementById('heroTitle').textContent = post.inspired_by?.topic || 'Latest Post';
                    document.getElementById('heroText').textContent = currentPost;
                    
                    contentData.push({
                        title: post.inspired_by?.topic || 'Latest',
                        linkedin_post: post.content,
                        domains: post.inspired_by?.domains || ['GRC'],
                        template_used: post.template_name || 'Insight',
                        generated_at: post.generated_at
                    });
                }

                // Domain posts
                if (domainPostsRes.ok) {
                    const posts = await domainPostsRes.json();
                    posts.forEach(p => {
                        contentData.push({
                            title: p.inspired_by?.topic || 'Post',
                            linkedin_post: p.content,
                            domains: [p.domain || 'GRC'],
                            template_used: p.template_name || 'Insight',
                            generated_at: p.generated_at
                        });
                    });
                }

                // History
                if (historyRes.ok) {
                    const history = await historyRes.json();
                    const titles = new Set(contentData.map(c => c.title));
                    history.forEach(h => {
                        if (!titles.has(h.title)) contentData.push(h);
                    });
                }

                render();
            } catch (e) {
                console.error('Error:', e);
            }
        }

        // Render
        function render() {
            // Stats
            const articles = Array.isArray(newsData) ? newsData : [];
            const highPriority = articles.filter(a => (a.total_score || 0) >= 24);
            const topScore = articles.length ? Math.max(...articles.map(a => a.total_score || 0)) : 0;

            document.getElementById('statTotal').textContent = articles.length;
            document.getElementById('statHigh').textContent = highPriority.length;
            document.getElementById('statPosts').textContent = contentData.length;
            document.getElementById('statTopScore').textContent = topScore;

            // Articles
            const topArticles = articles.slice(0, 6);
            document.getElementById('topArticles').innerHTML = topArticles.length === 0 
                ? '<div class="empty-state"><h3>No articles yet</h3></div>'
                : topArticles.map(renderArticle).join('');

            document.getElementById('allArticles').innerHTML = articles.length === 0 
                ? '<div class="empty-state"><h3>No articles yet</h3></div>'
                : articles.map(renderArticle).join('');

            // Posts
            document.getElementById('allPosts').innerHTML = contentData.length === 0 
                ? '<div class="empty-state"><h3>No posts yet</h3></div>'
                : contentData.slice().sort((a, b) => new Date(b.generated_at || 0) - new Date(a.generated_at || 0)).map(renderPost).join('');
        }

        function renderArticle(item) {
            const score = item.total_score || 0;
            const scoreClass = score >= 30 ? 'high' : score >= 24 ? 'medium' : 'low';
            const domain = (item.domains && item.domains[0]) || 'GRC';

            return `
                <div class="article-card" onclick="window.open('${item.url || '#'}', '_blank')">
                    <div class="article-score ${scoreClass}">${score}</div>
                    <div class="article-title">${item.title || 'Untitled'}</div>
                    <div class="article-meta">
                        <span class="domain-tag ${domain.toLowerCase()}">${domain}</span>
                        <span class="article-source">${item.source || 'Unknown'}</span>
                    </div>
                </div>
            `;
        }

        function renderPost(post) {
            const domain = (post.domains && post.domains[0]) || 'GRC';
            const date = post.generated_at ? new Date(post.generated_at).toLocaleDateString() : 'Recent';

            return `
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-template">${post.template_used || 'Insight'}</span>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="post-content">
                        <div class="post-text">${post.linkedin_post || ''}</div>
                    </div>
                    <div class="post-footer">
                        <span class="domain-tag ${domain.toLowerCase()}">${domain}</span>
                        <button class="copy-btn" onclick="event.stopPropagation(); copySpecificPost('${post.linkedin_post}')">Copy</button>
                    </div>
                </div>
            `;
        }

        // Navigation
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');

            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target?.classList.add('active');
        }

        // Copy
        function copyPost() {
            if (!currentPost) { showToast('No post to copy'); return; }
            navigator.clipboard.writeText(currentPost);
            showToast('Post copied!');
        }

        function copySpecificPost(text) {
            navigator.clipboard.writeText(text);
            showToast('Post copied!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === '1') switchPage('dashboard');
            if (e.key === '2') switchPage('articles');
            if (e.key === '3') switchPage('posts');
            if (e.key.toLowerCase() === 'c') copyPost();
        });
    </script>
</body>
</html>
