<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC Copilot - Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0F172E;
            --accent: #EF4444;
            --accent-dark: #DC2626;
            --bg-dark: #0A0E27;
            --bg-card: #111B33;
            --bg-hover: #1A2847;
            --text: #F5F7FA;
            --text-secondary: #A8B5C7;
            --text-muted: #697B91;
            --border: #1E2D47;
            
            --grc: #FFF3E0; --grc-text: #8B5A00;
            --security: #FFEBEE; --security-text: #C62828;
            --privacy: #E3F2FD; --privacy-text: #1565C0;
            --ai: #F3E5F5; --ai-text: #7B1FA2;
            --devsecops: #E0F2F1; --devsecops-text: #00695C;
            --product: #FBE9E7; --product-text: #BF360C;
            --cloud: #E8F5E9; --cloud-text: #1B5E20;
        }
        
        html, body { width: 100%; height: 100%; }
        
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* LOGIN */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #1a2a5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        
        .login-box {
            background: var(--bg-card);
            padding: 48px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .login-box h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-box p { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
        
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        
        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .login-box button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
        
        #dashboardScreen { display: none; }
        
        #dashboardScreen.show { display: flex; }
        
        #dashboardScreen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(180deg, var(--bg-card) 0%, rgba(17, 27, 51, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .logo:hover { transform: scale(1.05); }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
        }
        
        .nav-tab {
            padding: 10px 18px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        
        .nav-tab:hover { color: var(--text); background: rgba(239, 68, 68, 0.05); }
        
        .nav-tab.active {
            color: var(--accent);
            background: rgba(239, 68, 68, 0.1);
            border-bottom-color: var(--accent);
        }
        
        .header-right {
            display: flex;
            gap: 12px;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        
        /* MAIN CONTENT */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        
        .page {
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .page.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* HERO POST */
        .hero-section {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(17, 27, 51, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .hero-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .hero-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            line-height: 1.4;
        }
        
        .hero-content {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .hero-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .hero-meta {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .copy-hero-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .copy-hero-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        
        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(17, 27, 51, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
        }
        
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15);
            background: linear-gradient(135deg, rgba(17, 27, 51, 0.95) 0%, rgba(26, 40, 71, 0.9) 100%);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        
        .card-domain {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card-template {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .card-content {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
            min-height: 100px;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .domain-tag {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .domain-tag.grc { background: var(--grc); color: var(--grc-text); }
        .domain-tag.security { background: var(--security); color: var(--security-text); }
        .domain-tag.privacy { background: var(--privacy); color: var(--privacy-text); }
        .domain-tag.ai { background: var(--ai); color: var(--ai-text); }
        .domain-tag.devsecops { background: var(--devsecops); color: var(--devsecops-text); }
        .domain-tag.product { background: var(--product); color: var(--product-text); }
        .domain-tag.cloud { background: var(--cloud); color: var(--cloud-text); }
        
        .copy-btn {
            padding: 8px 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        
        .copy-btn:active { transform: scale(0.95); }
        
        /* SECTION TITLE */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 28px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent), var(--accent-dark));
            margin-right: 12px;
            border-radius: 2px;
        }
        
        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 10000;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(1.1);
        }
        
        .modal-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .modal-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .modal-body {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .modal-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(239, 68, 68, 0.4);
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .content { padding: 20px; }
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .nav-tabs { flex-wrap: wrap; }
            .hero-section { padding: 24px; }
            .hero-title { font-size: 22px; }
            .hero-footer { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>GRC Copilot</h1>
            <p>Secure Access to Intelligence Dashboard</p>
            <input type="password" id="passwordInput" placeholder="Enter password" />
            <button onclick="authenticate()">Access Dashboard</button>
        </div>
    </div>
    
    <!-- DASHBOARD -->
    <div id="dashboardScreen">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="logo" onclick="location.reload();">
                    <div class="logo-icon">⚙️</div>
                    <div class="logo-text">GRC COPILOT</div>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
                    <button class="nav-tab" onclick="showPage('articles')">Articles</button>
                    <button class="nav-tab" onclick="showPage('posts')">Posts</button>
                </div>
            </div>
            <div class="header-right">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <!-- CONTENT -->
        <div class="content">
            <!-- DASHBOARD PAGE -->
            <div id="dashboard" class="page active">
                <!-- Hero Post -->
                <div id="heroPostContainer"></div>
                
                <!-- Domain Posts -->
                <div>
                    <h2 class="section-title">Today's Intelligence</h2>
                    <div class="grid" id="domainPostsGrid"></div>
                </div>
            </div>
            
            <!-- ARTICLES PAGE -->
            <div id="articles" class="page">
                <h2 class="section-title">Intelligence Feed</h2>
                <div class="grid" id="articlesGrid"></div>
            </div>
            
            <!-- POSTS PAGE -->
            <div id="posts" class="page">
                <h2 class="section-title">All Posts</h2>
                <div class="grid" id="allPostsGrid"></div>
            </div>
        </div>
    </div>
    
    <!-- TOAST -->
    <div id="toast" class="toast"></div>
    
    <!-- MODAL -->
    <div id="postModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <div class="modal-title" id="modalDomain"></div>
                <div class="modal-meta">
                    <span id="modalTemplate"></span>
                    <span id="modalDate"></span>
                </div>
            </div>
            <div class="modal-body" id="modalContent"></div>
            <div class="modal-footer">
                <button class="copy-hero-btn" onclick="copyModalPost()">📋 Copy Post</button>
            </div>
        </div>
    </div>
    
    <script>
        const PASSWORD = "GRC2026!Shree";
        let domainPosts = [];
        let allPosts = [];
        let articles = [];
        
        // Auth
        function authenticate() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').classList.add('show');
                loadData();
            } else {
                alert('Invalid password');
            }
        }
        
        function logout() {
            document.getElementById('dashboardScreen').classList.remove('show');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }
        
        // Navigation
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (page === 'posts') {
                renderAllPosts();
            } else if (page === 'articles') {
                renderArticles();
            }
        }
        
        // Data Loading
        async function loadData() {
            try {
                // Load domain posts (today's posts)
                const domainResponse = await fetch('data/domain_posts.json');
                domainPosts = await domainResponse.json();
                
                // Load content history (all accumulated posts)
                const historyResponse = await fetch('data/content_history.json');
                allPosts = await historyResponse.json();
                
                // Load articles (scored news)
                const articlesResponse = await fetch('data/articles.json');
                articles = await articlesResponse.json();
                
                renderDashboard();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }
        
        // Render Dashboard
        function renderDashboard() {
            renderHeroPost();
            renderDomainPosts();
        }
        
        function renderHeroPost() {
            const container = document.getElementById('heroPostContainer');
            if (!domainPosts || domainPosts.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            const post = domainPosts[0];
            const domain = post.domain || 'GRC';
            
            container.innerHTML = `
                <div class="hero-section">
                    <div class="hero-badge">${domain} • ${post.template_name || 'Insight'}</div>
                    <div class="hero-title">${getHeroTitle(post.content)}</div>
                    <div class="hero-content">${post.content}</div>
                    <div class="hero-footer">
                        <div class="hero-meta">
                            <span>Domain: ${domain}</span>
                            <span>Template: ${post.template_name || 'Insight'}</span>
                            <span>${new Date(post.generated_at).toLocaleDateString()}</span>
                        </div>
                        <button class="copy-hero-btn" onclick="copyPost('${escapeText(post.content)}')">📋 Copy Post</button>
                    </div>
                </div>
            `;
        }
        
        function getHeroTitle(content) {
            const lines = content.split('\n');
            for (let line of lines) {
                if (line.trim().length > 10 && line.trim().length < 100) {
                    return line.replace(/\*\*/g, '').trim();
                }
            }
            return content.substring(0, 50) + '...';
        }
        
        function renderDomainPosts() {
            const container = document.getElementById('domainPostsGrid');
            if (!domainPosts || domainPosts.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px;">No posts generated yet</div>';
                return;
            }
            
            container.innerHTML = domainPosts.slice(0, 8).map((post, index) => {
                const domain = post.domain || 'GRC';
                return `
                    <div class="card" onclick="copyPost('${escapeText(post.content)}')">
                        <div class="card-header">
                            <div class="card-domain">${domain}</div>
                            <div class="card-template">${post.template_name || 'Insight'}</div>
                        </div>
                        <div class="card-content">${post.content}</div>
                        <div class="card-footer">
                            <div class="domain-tag ${domain.toLowerCase()}">${domain}</div>
                            <button class="copy-btn" onclick="event.stopPropagation(); copyPost('${escapeText(post.content)}')">Copy</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderAllPosts() {
            const container = document.getElementById('allPostsGrid');
            if (!allPosts || allPosts.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px;">No posts available</div>';
                return;
            }
            
            container.innerHTML = allPosts.map((post, index) => {
                const domain = (post.domains && post.domains[0]) || post.domain || 'GRC';
                const content = post.linkedin_post || post.content || '';
                const template = post.template_used || post.template_name || 'Insight';
                const date = post.generated_at ? new Date(post.generated_at).toLocaleDateString() : '';
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-domain">${domain}</div>
                            <div class="card-template">${template}</div>
                        </div>
                        <div class="card-content">${content}</div>
                        <div class="card-footer">
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <div class="domain-tag ${domain.toLowerCase()}">${domain}</div>
                                ${date ? `<span style="font-size: 11px; color: var(--text-muted);">${date}</span>` : ''}
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="copy-btn" onclick="openPostModal(${index})">Read</button>
                                <button class="copy-btn" onclick="copyPost('${escapeText(content)}')">Copy</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderArticles() {
            const container = document.getElementById('articlesGrid');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px 20px;">No articles available</div>';
                return;
            }
            
            container.innerHTML = articles.slice(0, 50).map(article => {
                const domain = (article.domains && article.domains[0]) || 'GRC';
                const score = article.score || 5;
                const totalScore = article.total_score || 20;
                const date = article.published ? new Date(article.published).toLocaleDateString() : '';
                
                return `
                    <div class="card" onclick="window.open('${article.url}', '_blank')">
                        <div class="card-header">
                            <div class="card-domain">${domain}</div>
                            <div style="display: flex; gap: 6px; align-items: center;">
                                <div class="card-template">Score: ${score}/10</div>
                            </div>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <div style="font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4;">${article.title}</div>
                            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">${article.source}</div>
                        </div>
                        <div class="card-content" style="font-size: 14px;">${article.score_reason || article.summary || ''}</div>
                        <div class="card-footer">
                            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                                <div class="domain-tag ${domain.toLowerCase()}">${domain}</div>
                                ${date ? `<span style="font-size: 11px; color: var(--text-muted);">${date}</span>` : ''}
                            </div>
                            <button class="copy-btn" onclick="event.stopPropagation(); window.open('${article.url}', '_blank')">Read →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Copy function
        function copyPost(text) {
            navigator.clipboard.writeText(text);
            showToast('✓ Post copied to clipboard');
        }
        
        function escapeText(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, ' ');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // Modal functions
        let currentModalPost = null;
        
        function openPostModal(index) {
            if (!allPosts || !allPosts[index]) return;
            
            const post = allPosts[index];
            currentModalPost = post;
            
            const domain = (post.domains && post.domains[0]) || post.domain || 'GRC';
            const content = post.linkedin_post || post.content || '';
            const template = post.template_used || post.template_name || 'Insight';
            const date = post.generated_at ? new Date(post.generated_at).toLocaleDateString() : '';
            
            document.getElementById('modalDomain').textContent = domain;
            document.getElementById('modalTemplate').textContent = template;
            document.getElementById('modalDate').textContent = date;
            document.getElementById('modalContent').textContent = content;
            
            document.getElementById('postModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('postModal').classList.remove('show');
            currentModalPost = null;
        }
        
        function copyModalPost() {
            if (currentModalPost) {
                const content = currentModalPost.linkedin_post || currentModalPost.content || '';
                navigator.clipboard.writeText(content);
                showToast('✓ Post copied to clipboard');
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('postModal').classList.contains('show')) {
                    closeModal();
                } else {
                    logout();
                }
            }
            if (e.ctrlKey && e.key === 'c' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                copyPost(domainPosts[0]?.content || '');
            }
        });
        
        // Enter to login
        document.getElementById('passwordInput')?.addEventListener('keypress', e => {
            if (e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
